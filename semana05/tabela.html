<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabela</title>
    <link rel="stylesheet" href="estilos/tabela.css">
</head>
<body>
    <table>
        <thead>
          <tr>
            <th>Liga</th>
            <th>Time</th>
            <th>Retrospecto (vitória-derrota)</th>
        <th>Número de jogadores</th>
      </tr>
    </thead>
    <tbody>
        <tr>
            <th rowspan="2">Sul</th>
            <td>Paraná</td>
            <td>52-19</td>
            <td>23</td>
        </tr>
        <tr>
            <td>Santa Catarina</td>
            <td>49-24</td>
            <td>10</td>
        </tr>
        <tr>
            <th rowspan="3">Oeste</th>
            <td>Larceda</td>
            <td>92-70</td>
            <td>27</td>
        </tr>
        <tr>
            <td>Acre</td>
            <td>75-87</td>
            <td>20</td>
        </tr>
        <tr>
            <td>Rodônia</td>
            <td>10-7</td>
            <td>12</td>
        </tr>
    </tbody>
    <tfoot>
      <tr>
        <th colspan="3">Total de jogadores</th>
        <td>92</td>
      </tr>
    </tbody>
</table>

<!--
thead – Contém as linhas de cabeçalho da tabela
tbody – Contém as linhas de dados da tabela principal
tfoot – Contém linhas de rodapé (como valor total ou resumos)
colspan="2" – A célula se estende por 2 colunas
colspan="3" – A célula se estende por 3 colunas
Os elementos a seguir são utilizados para criar uma tabela:
<table> – Cria o contêiner para toda a tabela
<tr> – Cria uma linha na tabela (tr significa "table row")
<td> – Cria uma célula de dados da tabela (td significa "table data")
<th> – Cria uma célula de cabeçalho (th significa "table header")
-->
