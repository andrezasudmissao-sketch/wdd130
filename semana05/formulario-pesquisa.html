<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WWD 130 | Formulário HTML - Pesquisa Usuário</title>
        <link rel="stylesheet" href="estilos/formulario-pesquisa.css">
    </head>
    <header>
        <h1>WWD 130 | Formulário HTML - Pesquisa Usuário</h1>
    </header>
    <main>
        <form>
            <label for="nome-de-usuário"> Nome de Usuário:</label>
            <input type="text" id="nome-de-usuário" name="nome-de-usuário" required>
            <label for="emaildousuario"> Email do Usuário:</label>
            <input type="email" id="emaildousuario" name="emaildousuario" required>
            <label for="quantidade"> Selecionar a quantidade:</label>
            <select name= "quantidade" id="quantidade">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
            <label for="navegador"> Qual seu navegador favorito?</label>
            <select name="navegador" id="navegador">
                <option value="chrome">Chrome</option>
                <option value="firefox">Firefox</option>
                <option value="safari">Safari</option>
                <option value="edge">Edge</option>
            </select>
            <label for="pet"> Qual seu animal de estimação favorito?</label>
            <input type="checkbox" id="pet" name="pet">
            <label for="feedback">Liste lugares onde você morou:</label>
            <textarea id="feedback" name="feedback" rows="4" placeholder="Paris, França; Nova York EUA, Tokyo Japão "></textarea>
            <button type="submit">Enviar pesquisa</button>
        </form>
    </main>
    <footer><p>&copy; 2026  Formulário de Pesquisa HTML - Atividade de Pesquisa de Usuário | Andreza Gomes </p></footer>
</html>
